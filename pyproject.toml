[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "acatome-chat"
version = "0.1.0"
description = "Acatome research assistant — lambic shell with MCP tools"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "lambic>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "black>=24.0"]

[project.scripts]
acatome-chat = "acatome_chat.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/acatome_chat"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
